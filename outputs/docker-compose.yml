services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: analysis_standards
      MYSQL_USER: standard_user
      MYSQL_PASSWORD: standard_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://standard_user:standard_password@mysql:3306/analysis_standards
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads:
